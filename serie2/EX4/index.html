<!DOCTYPE html>
<html>
    <head>
        <title>Exercice 4</title>
        <style>
            nav ul{
                display: flex;
                list-style: none;
                justify-content: center;
                gap: 20px;
                padding: 0;
            }
            nav a{
                text-decoration: none;
                color: black;
                padding: 10px;
            }
            #actife{
                background: green;
            }
            nav a:hover{
                background: orange;
                color: white;
            }
            .gallery{
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }
            .gallery img{
                width: 100%;
                border-radius: 10px; 
            }
            @media (max-width: 600px){
                .gallery{
                    grid-template-columns: 1fr;
                }
            }
            .gallery img:hover{
                 transform: scale(1.05);
            }
            h1{
                text-align: center;
            }
            body{
                font-family: Arial, sans-serif;
                margin: 20px;
            }
        </style>
    </head>
    <body>
        <nav>
            <ul>
                <li><a id="actife" href="#">Accueil</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">&Aacute; propos</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

            <img src="https://upload.wikimedia.org/wikipedia/commons/3/39/C_Hello_World_Program.png">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/35/The_C_Programming_Language_logo.svg/500px-The_C_Programming_Language_logo.svg.png">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ab/Official_CSS_Logo.svg/960px-Official_CSS_Logo.svg.png">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c3/Python-logo-notext.svg/960px-Python-logo-notext.svg.png">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/HTML5_logo_and_wordmark.svg/960px-HTML5_logo_and_wordmark.svg.png">

</html>
